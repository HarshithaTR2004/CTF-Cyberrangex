      - "2222:22"      # SSH
      - "4270:4200"    # Web Terminal
    environment:
      - VM_TYPE=linux
      - DIFFICULTY=medium
      - DOMAIN=active-directory
    networks:
      - cyberrangex-network
    restart: unless-stopped
    tty: true
    stdin_open: true

  vm-ad-hard:
    build:
      context: ./vms
      dockerfile: Dockerfile
