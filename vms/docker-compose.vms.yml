      - cyberrangex-network
    restart: unless-stopped
    tty: true
    stdin_open: true

  # Full Machine Exploitation (Pentest Lab) VMs
  vm-pentest-easy:
    build:
      context: ./vms
      dockerfile: Dockerfile
    container_name: vm-pentest-easy
    ports:
      - "2250:22"      # SSH
      - "4230:4200"    # Web Terminal
    environment:
      - VM_TYPE=linux
      - DIFFICULTY=easy
      - DOMAIN=pentest-lab
