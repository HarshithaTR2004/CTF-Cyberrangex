version: '3.8'

services:
  # Linux Privilege Escalation VMs
  vm-linux-easy:
    build:
      context: ./vms
      dockerfile: Dockerfile
    container_name: vm-linux-easy
    ports:
      - "2220:22"      # SSH
      - "4200:4200"    # Web Terminal
    environment:
      - VM_TYPE=linux
      - DIFFICULTY=easy
      - DOMAIN=linux-privilege-escalation
    networks:
      - cyberrangex-network
    restart: unless-stopped
    tty: true
    stdin_open: true

  vm-linux-medium:
    build:
      context: ./vms
      dockerfile: Dockerfile
    container_name: vm-linux-medium
    ports:
      - "2230:22"      # SSH
      - "4210:4200"    # Web Terminal
    environment:
      - VM_TYPE=linux
      - DIFFICULTY=medium
      - DOMAIN=linux-privilege-escalation
