apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cyberrangex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: cyberrangex-backend:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: cyberrangex-config
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cyberrangex
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: cyberrangex
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi

